name: Harness Check

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: harness-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  harness-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Warn about optional harness metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -u

          if ! printf '%s\n' "$PR_BODY" | grep -Eq 'Closes[[:space:]]+#[1-9][0-9]*'; then
            printf '%s\n' 'HARNESS WARNING: PR body does not contain "Closes #<issue>"' >&2
          fi

          for field in 'Linked Issue' 'Harness Attempt' 'Harness Status'; do
            if ! printf '%s\n' "$PR_BODY" | grep -Eq "^[[:space:]]*[-*]?[[:space:]]*${field}[[:space:]]*:"; then
              printf 'HARNESS WARNING: optional PR field is missing: %s\n' "$field" >&2
            fi
          done

          printf '%s\n' 'Harness metadata is advisory and does not determine CI success.'

      - name: Check required harness files
        shell: bash
        run: |
          set -euo pipefail

          required_files='AGENTS.md
          .codex/skills/coffee-order-issue-loop/SKILL.md
          .codex/agents/planner.md
          .codex/agents/implementer.md
          .codex/agents/reviewer.md
          .codex/hooks/require-log.sh
          .codex/hooks/report-github-status.sh
          .githooks/pre-push
          logs/README.md
          logs/attempt-log-template.md
          logs/verification-log.md'

          missing=0
          while IFS= read -r file; do
            file=$(printf '%s' "$file" | sed 's/^[[:space:]]*//')
            if [ ! -f "$file" ]; then
              printf 'HARNESS CHECK FAILED: missing file: %s\n' "$file" >&2
              missing=1
            fi
          done <<EOF
          $required_files
          EOF

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check Bash syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n .codex/hooks/require-log.sh
          bash -n .codex/hooks/report-github-status.sh
          bash -n .githooks/pre-push

      - name: Check executable permissions
        shell: bash
        run: |
          set -euo pipefail
          for file in \
            .codex/hooks/require-log.sh \
            .codex/hooks/report-github-status.sh \
            .githooks/pre-push \
            gradlew
          do
            if [ ! -x "$file" ]; then
              printf 'HARNESS CHECK FAILED: executable permission required: %s\n' "$file" >&2
              exit 1
            fi
          done

      - name: Run Gradle tests
        run: ./gradlew test

      - name: Run Gradle build without repeating tests
        run: ./gradlew build -x test

      - name: Report harness CI success
        shell: bash
        run: |
          printf '%s\n' 'HARNESS CI PASSED'
          printf '%s\n' 'Blocking checks: required files, Bash syntax, executable permissions, tests, build'
