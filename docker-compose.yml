services:
  mysql-primary:
    image: mysql:8.4
    container_name: coffee-order-mysql-primary
    restart: unless-stopped
    ports:
      - "${MYSQL_PRIMARY_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coffee_order}
      MYSQL_USER: ${MYSQL_USER:-coffee_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-coffee_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-replicator}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:-replicator_password}
      TZ: Asia/Seoul
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    volumes:
      - mysql-primary-data:/var/lib/mysql
      - ./docker/mysql/create-replication-user.sh:/docker-entrypoint-initdb.d/01-create-replication-user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - coffee-order-network

  mysql-replica:
    image: mysql:8.4
    container_name: coffee-order-mysql-replica
    restart: unless-stopped
    depends_on:
      mysql-primary:
        condition: service_healthy
    ports:
      - "${MYSQL_REPLICA_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coffee_order}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-replicator}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:-replicator_password}
      TZ: Asia/Seoul
    command:
      - --server-id=2
      - --relay-log=relay-bin
      - --read-only=ON
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    volumes:
      - mysql-replica-data:/var/lib/mysql
      - ./docker/mysql/configure-replica.sh:/docker-entrypoint-initdb.d/01-configure-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - coffee-order-network

  redis-master:
    image: redis:7.4-alpine
    container_name: coffee-order-redis-master
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis-master.conf"]
    volumes:
      - redis-master-data:/data
      - ./docker/redis/redis-master.conf:/usr/local/etc/redis/redis-master.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coffee-order-network

  redis-replica:
    image: redis:7.4-alpine
    container_name: coffee-order-redis-replica
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    ports:
      - "${REDIS_REPLICA_PORT:-6380}:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis-replica.conf"]
    volumes:
      - redis-replica-data:/data
      - ./docker/redis/redis-replica.conf:/usr/local/etc/redis/redis-replica.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coffee-order-network

  redis-sentinel-1:
    image: redis:7.4-alpine
    container_name: coffee-order-redis-sentinel-1
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_1_PORT:-26379}:26379"
    command: ["sh", "-c", "cp /usr/local/etc/redis/sentinel.conf /tmp/sentinel.conf && /usr/local/bin/start-sentinel.sh"]
    volumes:
      - ./docker/redis/sentinel-1.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./docker/redis/start-sentinel.sh:/usr/local/bin/start-sentinel.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 SENTINEL masters | grep -q coffee-order-redis"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - coffee-order-network

  redis-sentinel-2:
    image: redis:7.4-alpine
    container_name: coffee-order-redis-sentinel-2
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_2_PORT:-26380}:26379"
    command: ["sh", "-c", "cp /usr/local/etc/redis/sentinel.conf /tmp/sentinel.conf && /usr/local/bin/start-sentinel.sh"]
    volumes:
      - ./docker/redis/sentinel-2.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./docker/redis/start-sentinel.sh:/usr/local/bin/start-sentinel.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 SENTINEL masters | grep -q coffee-order-redis"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - coffee-order-network

  redis-sentinel-3:
    image: redis:7.4-alpine
    container_name: coffee-order-redis-sentinel-3
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_3_PORT:-26381}:26379"
    command: ["sh", "-c", "cp /usr/local/etc/redis/sentinel.conf /tmp/sentinel.conf && /usr/local/bin/start-sentinel.sh"]
    volumes:
      - ./docker/redis/sentinel-3.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./docker/redis/start-sentinel.sh:/usr/local/bin/start-sentinel.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 26379 SENTINEL masters | grep -q coffee-order-redis"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - coffee-order-network

  app-ha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-order-app-ha
    restart: "no"
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    ports:
      - "${APP_HA_PORT:-18080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: redis-ha
      DB_PRIMARY_URL: jdbc:mysql://mysql-primary:3306/${MYSQL_DATABASE:-coffee_order}?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
      DB_REPLICA_URL: jdbc:mysql://mysql-replica:3306/${MYSQL_DATABASE:-coffee_order}?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER:-coffee_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-coffee_password}
    networks:
      - coffee-order-network

volumes:
  mysql-primary-data:
  mysql-replica-data:
  redis-master-data:
  redis-replica-data:

networks:
  coffee-order-network:
    driver: bridge
